<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebraico Quest</title>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Consolas&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/course.css">
    <link rel="stylesheet" href="css/quiz.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo">
            <h2>📜 Hebraico Quest</h2>
        </div>
        <nav id="menuLateral">
            <button class="menu-btn" data-page="dashboard">
                <span class="material-symbols-outlined">dashboard</span> Dashboard
            </button>
            <button class="menu-btn" data-page="curso">
                <span class="material-symbols-outlined">school</span> Curso
            </button>
            <button class="menu-btn" data-page="quiz">
                <span class="material-symbols-outlined">quiz</span> Quiz
            </button>
            <button class="menu-btn" data-page="dicionario">
                <span class="material-symbols-outlined">menu_book</span> Dicionário
            </button>
            <button class="menu-btn" data-page="biblia">
                <span class="material-symbols-outlined">auto_stories</span> Bíblia
            </button>
            <button class="menu-btn" data-page="flashcards">
                <span class="material-symbols-outlined">style</span> Flashcards
            </button>
            <button class="menu-btn" data-page="memoria">
                <span class="material-symbols-outlined">grid_view</span> Memória
            </button>
            <button class="menu-btn" data-page="caca-palavras">
                <span class="material-symbols-outlined">search</span> Caça-palavras
            </button>
            <button class="menu-btn" data-page="forca">
                <span class="material-symbols-outlined">extension</span> Forca
            </button>
            <button class="menu-btn" data-page="arrastar-letras">
                <span class="material-symbols-outlined">drag_indicator</span> Arrastar Letras
            </button>
            <button class="menu-btn" data-page="perfil">
                <span class="material-symbols-outlined">person</span> Perfil
            </button>
            <button class="menu-btn" data-page="conquistas">
                <span class="material-symbols-outlined">trophy</span> Conquistas
            </button>
            <button class="menu-btn" data-page="configuracoes">
                <span class="material-symbols-outlined">settings</span> Configurações
            </button>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <button id="btnHamburger" class="hamburger" aria-label="Abrir menu">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 id="tituloPagina">Dashboard</h1>
            <div class="usuario" style="display:flex; align-items:center; gap:12px;">
                <button id="btnTema" class="btn-icone" aria-label="Alternar tema">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
                <span class="material-symbols-outlined">account_circle</span>
                <span id="perfilNome">Visitante</span>
            </div>
        </header>
        <section id="conteudo" class="conteudo"></section>
    </main>
</div>
<div id="overlay" class="overlay"></div>

<!-- Scripts -->
<script src="js/storage.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/router.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/course.js"></script>
<script src="js/quiz.js"></script>
<script src="js/perfis.js"></script>
<script src="js/conquistas.js"></script>
<script src="js/dicionario.js"></script>
<script src="js/biblia.js"></script>
<script src="js/flashcards.js"></script>
<script src="js/memoria.js"></script>
<script src="js/cacaPalavras.js"></script>
<script src="js/forca.js"></script>
<script src="js/arrastarLetras.js"></script>
<script src="js/app.js"></script>
</body>
</html>
